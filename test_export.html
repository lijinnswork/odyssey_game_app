<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
    <script src="content.js"></script>
    <script src="app.js"></script>
    <script>
        setTimeout(() => {
            try {
                // Mock fetch to test the string replacement natively
                const originalFetch = window.fetch;
                
                // Let's just run exportContentJS directly, it will use fetch.
                // We will hook into the error.
                window.onerror = function(msg, url, lineNo, columnNo, error) {
                    console.error("GLOBAL ERROR:", msg);
                    return false;
                };

                // Provide a mock fetch to read local file
                window.fetch = function(url) {
                    if (url === 'content.js') {
                        return Promise.resolve({
                            text: () => Promise.resolve(document.documentElement.innerHTML) 
                        });
                    }
                    return originalFetch(url);
                };

                exportContentJS();
                console.log("Called exportContentJS");
            } catch (e) {
                console.error("CAUGHT ERROR:", e.message);
            }
        }, 1000);
    </script>
</body>
</html>
